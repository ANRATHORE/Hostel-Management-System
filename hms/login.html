<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center" style="min-height:100vh;background:#f8f9fa;">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-dark text-white text-center"><h4>Login</h4></div>
        <div class="card-body">
          <form action="submit_login.php" method="post">
            <div class="mb-3"><label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required></div>

            <div class="mb-3"><label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required></div>

            <button class="btn btn-dark w-100" type="submit">Login</button>
          </form>
          <p class="text-center mt-3">New user? <a href="register.html">Register</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
